# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1586f091aab94823b19a1d785ec0a7a5"
name = "SmartCrop"
application_url = "https://smart-crop-app.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

# Compliance topics (`customers/data_request`, `customers/redact`, `shop/redact`)
# are only valid for App Store distribution apps. Re-add these subscriptions if
# this app is distributed through the Shopify App Store.

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products"

[auth]
redirect_urls = [ "https://smart-crop-app.onrender.com/auth/callback" ]
