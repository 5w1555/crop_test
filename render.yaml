databases:
  - name: smart-crop-db
    databaseName: smart_crop
    user: smart_crop
    plan: free

services:
  - type: web
    name: smart-crop-app
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run setup && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-crop-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://smart-crop-app.onrender.com
      - key: SCOPES
        value: write_products
      - key: SHOP_CUSTOM_DOMAIN
        sync: false
      - key: SMARTCROP_API_URL
        value: https://smart-crop-api.onrender.com

  - type: web
    name: smart-crop-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: fastapi_service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMARTCROP_FRONTEND_ORIGINS
        value: https://smart-crop-app.onrender.com
