databases:
  - name: smart-crop-db
    databaseName: smart_crop
    user: smart_crop
    plan: free

services:
  - type: web
    name: smart-crop-app
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run setup && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-crop-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: write_products
      - key: SHOP_CUSTOM_DOMAIN
        sync: false

  - type: web
    name: smart-crop-api
    runtime: python
    plan: free
    region: oregon
    rootDir: fastapi_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
