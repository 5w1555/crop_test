services:
  - type: web
    name: smart-crop-app
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run setup && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: 1REDACTED
      - key: SHOPIFY_API_SECRET
        sync: REDACTED
      - key: SHOPIFY_APP_URL
        value: https://smart-crop-app.onrender.com
      - key: SCOPES
        value: read_products
      - key: SHOPIFY_BILLING_TEST_MODE
        value: "false"
      - key: SHOP_CUSTOM_DOMAIN
        sync: false
      - key: SMARTCROP_API_URL
        value: https://smart-crop-api-f97p.onrender.com
      - key: SMARTCROP_API_TOKEN
        sync: false

  - type: web
    name: smart-crop-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: fastapi_service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SMARTCROP_FRONTEND_ORIGINS
        value: https://smart-crop-app.onrender.com
      - key: DOWNLOAD_BASE_URL
        value: https://smart-crop-api-f97p.onrender.com
      - key: SMARTCROP_MAX_UPLOAD_MB
        value: "12"
      - key: SMARTCROP_MAX_BATCH_FILES
        value: "8"
      - key: SMARTCROP_MAX_CONCURRENCY
        value: "1"
      - key: SMARTCROP_ACQUIRE_TIMEOUT_SECONDS
        value: "20"
      - key: SMARTCROP_PRELOAD_MODEL
        value: "1"
      - key: SMARTCROP_API_TOKEN
        sync: false
